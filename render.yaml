services:
  - type: web
    name: workout-tracker-app
    env: node
    plan: free
    rootDir: .
    autoDeploy: true
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build
    preDeployCommand: corepack enable && pnpm run db:migrate && pnpm run db:seed
    startCommand: corepack enable && pnpm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: TOKEN_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: true
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: true
      - key: CORS_ORIGIN
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 200
      - key: RATE_LIMIT_WRITE_MAX
        value: 60
